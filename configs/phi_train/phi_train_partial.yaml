model:
  arch: aff_phi
  model_type: phi

  max_txt_len: 128
  max_output_txt_len: 256
  prompt_encoder_dim: 32

  # Lora Settings
  lora_r: 16
  lora_alpha: 32
  
  # LLM to Aff model output dimension
  freeze_point: True
  free_seg_point_encoder: False
  seg_point_encoder_config_path: "/workspace/project/Research_3D_Aff/3D_ADLLM/models/openad/config/PT_modify.py"
  seg_point_encoder_path: "/workspace/project/Research_3D_Aff/Ckpts/PointBackbone/best_model.t7"
  freeze_linear: False
  # aff
  train_aff_encoder: True
  # aff_path: 
  aff_path: "/workspace/project/Research_3D_Aff/Ckpts/PointBackbone/best_model.t7"
  # load_pretrained: False
  load_pretrained: True
  pretrained: "/workspace/project/Research_3D_Aff/Ckpts/Phi_Main/full_best.pth"
  # loss setting
  ce_loss_weight: 1.0
  dice_loss_weight: 1.0
  bce_loss_weight: 1.0
  uselabelratio: True
run:
  init_lr: 1e-4
  min_lr: 1e-6
  warmup_lr: 1e-8
  weight_decay: 0
  max_epoch: 10
  batch_size_train: 16
  batch_size_eval: 30
  num_workers: 4

  warmup_steps: 110
  iters_per_epoch: 2100
# 134436/16/4=2100
  accum_grad_iters: 4
  device: "cuda"
  find_unused_parameters: True  # important for seg model
  seed: 1
  output_dir: "/workspace/project/Research_3D_Aff/3D_ADLLM/outputs/main_partial"
  mixed_precision: 'bf16'
  evaluate: False

train_datasets:
# 134436
  3D_Affordance_train_new_prompt_partial:
    type: affordance

